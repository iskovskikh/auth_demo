
services:
  postgres:
    image: timescale/timescaledb-ha:pg15
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL_HOST=postgres
      - KC_DB_URL_PORT=${POSTGRES_PORT:-5432}
      - KC_DB_URL_DATABASE=${POSTGRES_DB:-db}
      - KC_DB_USERNAME=${POSTGRES_USER:-postgres}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
#      - ../assets/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - ../assets/auth-demo-realm-realm.json:/opt/keycloak/data/import/auth-demo-realm-realm.json
    ports:
      - 8080:8080
    command: |
      start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy
        restart: true